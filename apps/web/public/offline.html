<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · ShopMaster</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f6f7f9; color: #0f172a; text-align: center; padding: 24px;
      }
      @media (prefers-color-scheme: dark) { body { background: #0b1120; color: #e5e7eb; } }
      .card { max-width: 22rem; }
      .badge {
        width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 20px;
        background: #0f766e; display: grid; place-items: center;
      }
      h1 { font-size: 1.35rem; margin: 0 0 8px; }
      p { color: #64748b; line-height: 1.5; margin: 0; }
      @media (prefers-color-scheme: dark) { p { color: #94a3b8; } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l1.5-5h15L21 9M4 9v11h16V9M4 9h16M9 20v-6h6v6" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>ShopMaster keeps taking cash orders offline — reconnect and they'll sync automatically. Reopen the app once you're back online.</p>
    </div>
  </body>
</html>
